<!DOCTYPE html>
<html lang="ro" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulare Examen — ONM</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--acc:#9b6dff;--acc2:#c4a5ff;--acc3:#6d28d9;--f:'Outfit',sans-serif;--m:'JetBrains Mono',monospace;}
[data-theme="dark"]{--bg:#06060f;--text:#ede8ff;--muted:#605878;--card-bg:#0c0c1a;--border:rgba(130,100,255,.13);--border2:rgba(155,109,255,.28);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--f);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;}
.card{background:var(--card-bg);border:1px solid var(--border2);border-radius:20px;padding:3rem 2.5rem;max-width:480px;width:100%;}
.icon{font-size:3rem;margin-bottom:1rem;}
h1{font-size:1.8rem;font-weight:900;margin-bottom:.8rem;background:linear-gradient(135deg,var(--text),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
p{color:var(--muted);line-height:1.7;margin-bottom:1.5rem;font-size:15px;}
a{font-family:var(--m);font-size:12px;padding:.6rem 1.4rem;border-radius:10px;border:1px solid var(--border2);color:var(--acc2);text-decoration:none;transition:all .25s;}
a:hover{border-color:var(--acc);box-shadow:0 0 14px rgba(155,109,255,.3);}
</style>
</head>
<body>
<div class="card">
  <div class="icon">✎</div>
  <h1>Simulare Examen</h1>
  <p>Această pagină este în construcție. Simularea completă cu timer 4h, barem deblocat după finish și calculare medalie va fi disponibilă în curând.</p>
  <a href="index.html">← Înapoi la arhivă</a>
</div>
</body>
</html>
